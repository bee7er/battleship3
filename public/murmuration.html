<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Murmuration</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <!-- Fonts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

    <link href="/css/site.css?v25" rel="stylesheet">
</head>
<body>

<div>
    <canvas id="canvas" class="bs-the-canvas"></canvas>
    <div class="bs-container">
        <input class="button is-link" id="toggleButton" type="button" value="" onclick="return toggleContinuous();" />
        <input class="button is-link" id="stopButton" type="button" value="Stop" onclick="return stop();" />
        <div id="tip" class="bs-canvas-tip">&nbsp;</div>
    </div>
</div>


<script type="text/javascript">

    var ctx;
    var canvas;
    var flightArea = 150;
    var cWidthAdjust = 100;
    var cHeightAdjust = 150;
    var cWidth = $(window).width() - cWidthAdjust;
    var cHeight = $(window).height() - cHeightAdjust;
    var mouseX = cWidth / 2;
    var orgMouseX = mouseX;
    var mouseY = cHeight / 2;
    var orgMouseY = mouseY;
    var bifs = [];
    var useCursor = false;
    var cursorText = 'Switch to Continuous';
    var cursorTip = 'Move the cursor anywhere in the box';
    var continuousText = 'Switch to Cursor';
    var continuousTip = 'Sit back and relax';
    var stopTip = 'Click button to Restart';

    canvas = document.getElementById('canvas');
    ctx = canvas.getContext('2d');

    // Load the array of birds in flight (bifs)
    for (let i=0; i<200; i++) {
        bifs[i] = {
            x: 0,
            y: 0,
            offsetX: getRandomInt((flightArea * -1), flightArea),
            offsetY: getRandomInt((flightArea * -1), flightArea),
            orgOffsetX: 0,
            orgOffsetY: 0
        };
        bifs[i].orgOffsetX = bifs[i].offsetX;
        bifs[i].orgOffsetY = bifs[i].offsetY;
    }

    $(document).ready( function()
    {
        checkButtonValue();

        setCanvasSize();

        function animate() {

            ctx.clearRect(0, 0, cWidth, cHeight);
            for (const p of bifs) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, 2 * Math.PI);
                ctx.fillStyle = 'black';
                ctx.fill();
            }
            requestAnimationFrame(animate);
        }

        animate();

        if (false == useCursor) {
            goContinuous();
        }
    });

    function toggleContinuous()
    {
        useCursor = !useCursor;
        
        checkButtonValue();

        if (useCursor) {
            stopContinuous();
        } else {
            mouseX = orgMouseX;
            mouseY = orgMouseY;

            goContinuous();
        }
    }

    function stop()
    {
        useCursor = false;

        stopContinuous();

        checkButtonValue();

        $('#tip').html(stopTip);
    }

    function checkButtonValue()
    {
        if (useCursor) {
            $('#toggleButton').attr('value', cursorText);
            $('#tip').html(cursorTip);
        } else {
            $('#toggleButton').attr('value', continuousText);
            $('#tip').html(continuousTip);
        }
    }

    function setCanvasSize()
    {
        cWidth = $(window).width() - cWidthAdjust;
        cHeight = $(window).height() - cHeightAdjust;

        ctx.canvas.width  = cWidth;
        ctx.canvas.height = cHeight;
    }

    var intervalId = null;
    function goContinuous()
    {
        intervalId = setInterval(moveBifs, 20);
    }
    function stopContinuous()
    {
        if (null != intervalId) {
            clearInterval(intervalId);
            // release our intervalId from the variable
            intervalId = null;
        }
    }
    function moveBifs()
    {
        mouseX = getRandomInt(mouseX - 5, mouseX + 5);
        if (mouseX >= cWidth) mouseX = mouseX - 20;
        if (mouseX <= 0) mouseX = mouseX + 20;

        mouseY = getRandomInt(mouseY - 5, mouseY + 5);
        if (mouseY >= cHeight) mouseY = mouseY - 20;
        if (mouseY <= 0) mouseY = mouseY + 20;

        calcPositions();
    }

    function calcPositions()
    {
        // Calculate the relative position of bifs (birds in flight) here
        for (const p of bifs)
        {
            p.x = p.offsetX + mouseX;
            p.y = p.offsetY + mouseY;

            let distance = Math.floor(Math.sqrt((mouseX - p.x) ** 2 + (mouseY - p.y) ** 2));
            if (distance > flightArea) {
                p.x = mouseX;
                p.y = mouseY;
            }

            p.offsetX = getRandomInt(p.offsetX - 5, p.offsetX + 5);
            if (p.offsetX > flightArea || p.offsetX < (flightArea * -1)) {
                p.offsetX = p.orgOffsetX;
            }
            p.offsetY = getRandomInt(p.offsetY - 5, p.offsetY + 5);
            if (p.offsetY > flightArea || p.offsetY < (flightArea * -1)) {
                p.offsetY = p.orgOffsetY;
            }
        }
    }

    function getRandomInt(min, max) {
        let minCeiled = Math.ceil(min);
        let maxFloored = Math.floor(max + 1);
        // The maximum is exclusive and the minimum is inclusive
        return Math.floor(Math.random() * (maxFloored - minCeiled) + minCeiled);
    }

    window.addEventListener("resize", function(e)
    {
        setCanvasSize();
    });

    canvas.addEventListener("mousemove", function(e)
    {
        if (false == useCursor) {
            return;
        }

        if (e.offsetX) {
            mouseX = e.offsetX;
            mouseY = e.offsetY;
        }
        else if (e.layerX) {
            mouseX = e.layerX;
            mouseY = e.layerY;
        }

        calcPositions();
    });

    // Support touch screens
    function touchXY(e)
    {
        if (!e)
            var e = event;
        e.preventDefault();

        mouseX = e.targetTouches[0].pageX - canvas.offsetLeft;
        mouseY = e.targetTouches[0].pageY - canvas.offsetTop;

        calcPositions();
    }

    canvas.addEventListener("touchmove", touchXY, false);

</script>
</body>
</html>
